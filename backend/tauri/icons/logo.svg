  <!-- Center connector arrows -->
  <path d="M244 190 L268 190" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M262 184 L270 190 L262 196" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <path d="M244 280 L268 310" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M262 304 L270 312 L262 318" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Delta symbol watermark -->
  <text x="256" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="url(#accent)" opacity="0.4" letter-spacing="8">DIFFER</text>
