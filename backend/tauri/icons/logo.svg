<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Full square background (no rounded corners — macOS applies the mask) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Left panel (deletions side) -->
  <rect x="140" y="200" width="320" height="624" rx="24" fill="white" opacity="0.18"/>

  <!-- Right panel (additions side) -->
  <rect x="564" y="200" width="320" height="624" rx="24" fill="white" opacity="0.18"/>

  <!-- Left panel: neutral lines -->
  <rect x="176" y="260" width="180" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="296" width="140" height="14" rx="7" fill="white" opacity="0.4"/>

  <!-- Left panel: deleted lines (red highlight) -->
  <rect x="160" y="340" width="280" height="48" rx="10" fill="#ef4444" opacity="0.65"/>
  <rect x="180" y="355" width="200" height="14" rx="7" fill="white" opacity="0.95"/>

  <rect x="160" y="404" width="280" height="48" rx="10" fill="#ef4444" opacity="0.65"/>
  <rect x="180" y="419" width="160" height="14" rx="7" fill="white" opacity="0.95"/>

  <!-- Left panel: more neutral lines -->
  <rect x="176" y="484" width="160" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="520" width="200" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="556" width="120" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="592" width="180" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="628" width="150" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="664" width="170" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="700" width="130" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="176" y="736" width="190" height="14" rx="7" fill="white" opacity="0.4"/>

  <!-- Right panel: neutral lines -->
  <rect x="600" y="260" width="180" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="600" y="296" width="140" height="14" rx="7" fill="white" opacity="0.4"/>

  <!-- Right panel: added lines (green highlight) -->
  <rect x="584" y="340" width="280" height="48" rx="10" fill="#22c55e" opacity="0.7"/>
  <rect x="604" y="355" width="210" height="14" rx="7" fill="white" opacity="0.95"/>

  <rect x="584" y="404" width="280" height="48" rx="10" fill="#22c55e" opacity="0.7"/>
  <rect x="604" y="419" width="170" height="14" rx="7" fill="white" opacity="0.95"/>

  <rect x="584" y="468" width="280" height="48" rx="10" fill="#22c55e" opacity="0.7"/>
  <rect x="604" y="483" width="190" height="14" rx="7" fill="white" opacity="0.95"/>

  <!-- Right panel: more neutral lines -->
  <rect x="600" y="548" width="160" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="600" y="584" width="200" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="600" y="620" width="120" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="600" y="656" width="180" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="600" y="692" width="150" height="14" rx="7" fill="white" opacity="0.4"/>
  <rect x="600" y="728" width="170" height="14" rx="7" fill="white" opacity="0.4"/>

  <!-- Minus badge (left panel) -->
  <circle cx="300" cy="200" r="36" fill="#ef4444"/>
  <rect x="282" y="194" width="36" height="12" rx="6" fill="white"/>

  <!-- Plus badge (right panel) -->
  <circle cx="724" cy="200" r="36" fill="#22c55e"/>
  <rect x="706" y="194" width="36" height="12" rx="6" fill="white"/>
  <rect x="718" y="182" width="12" height="36" rx="6" fill="white"/>
</svg>
