<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Large bold delta triangle — thick stroke, centered -->
  <path
    d="M 512 180 L 820 760 L 204 760 Z"
    fill="none"
    stroke="white"
    stroke-width="64"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Split line through the middle — red to green gradient -->
  <line x1="200" y1="560" x2="824" y2="560" stroke="#ef4444" stroke-width="48" stroke-linecap="round"/>
  <line x1="512" y1="560" x2="824" y2="560" stroke="#22c55e" stroke-width="48" stroke-linecap="round"/>
</svg>
