<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>

  <!-- Left panel (deletions side) -->
  <rect x="72" y="96" width="168" height="320" rx="12" fill="#1e1e3a" stroke="#e94560" stroke-width="2" opacity="0.8"/>

  <!-- Right panel (additions side) -->
  <rect x="272" y="96" width="168" height="320" rx="12" fill="#1e1e3a" stroke="#818cf8" stroke-width="2" opacity="0.8"/>

  <!-- Left panel lines (code lines) -->
  <rect x="92" y="132" width="100" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>
  <rect x="92" y="152" width="80" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>

  <!-- Deleted line (red) -->
  <rect x="84" y="178" width="144" height="24" rx="4" fill="#e94560" opacity="0.15"/>
  <rect x="92" y="186" width="120" height="6" rx="3" fill="#e94560" opacity="0.8"/>

  <!-- More left lines -->
  <rect x="92" y="222" width="90" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>
  <rect x="92" y="242" width="110" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>

  <!-- Another deleted line -->
  <rect x="84" y="268" width="144" height="24" rx="4" fill="#e94560" opacity="0.15"/>
  <rect x="92" y="276" width="95" height="6" rx="3" fill="#e94560" opacity="0.8"/>

  <!-- Left bottom lines -->
  <rect x="92" y="312" width="70" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>
  <rect x="92" y="332" width="100" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>
  <rect x="92" y="352" width="60" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>

  <!-- Right panel lines (code lines) -->
  <rect x="292" y="132" width="100" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>
  <rect x="292" y="152" width="80" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>

  <!-- Added lines (blue/purple) -->
  <rect x="284" y="178" width="144" height="24" rx="4" fill="#818cf8" opacity="0.15"/>
  <rect x="292" y="186" width="128" height="6" rx="3" fill="#818cf8" opacity="0.8"/>

  <rect x="284" y="208" width="144" height="24" rx="4" fill="#818cf8" opacity="0.15"/>
  <rect x="292" y="216" width="105" height="6" rx="3" fill="#818cf8" opacity="0.8"/>

  <!-- More right lines -->
  <rect x="292" y="252" width="90" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>
  <rect x="292" y="272" width="110" height="6" rx="3" fill="#4a4a6a" opacity="0.6"/>

