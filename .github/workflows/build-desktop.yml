name: Build Desktop

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      artifact_prefix:
        required: false
        type: string
        default: "desktop"
      artifact_retention_days:
        required: false
        type: number
        default: 30

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Import Apple certificate
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          echo "$MAC_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import certificate.p12 -P "$MAC_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm certificate.p12

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bunx tauri build --target ${{ matrix.target }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-dmg
          path: backend/tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload updater bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-mac-${{ matrix.arch }}-updater
          path: |
            backend/tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            backend/tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz.sig
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux-x64-appimage
          path: |
            backend/tauri/target/release/bundle/appimage/*.AppImage
            backend/tauri/target/release/bundle/appimage/*.AppImage.sig
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix }}-linux-x64-deb
          path: backend/tauri/target/release/bundle/deb/*.deb
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
