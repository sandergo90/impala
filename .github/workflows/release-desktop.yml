name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*.*.*"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-desktop.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: List release artifacts
        run: ls -lhR release-artifacts/

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Generate update manifest (latest.json)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          # Read signatures
          # Find the updater signature and URL
          SIGFILE=$(ls release-artifacts/*.tar.gz.sig | head -1)
          SIG=$(cat "$SIGFILE")
          BUNDLE_URL="https://github.com/${REPO}/releases/download/desktop-v${VERSION}/$(basename "${SIGFILE%.sig}")"

          PLATFORMS=$(jq -n \
            --arg sig "$SIG" \
            --arg url "$BUNDLE_URL" \
            '{"darwin-aarch64": {"signature": $sig, "url": $url}}')

          # Write latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Canopy $VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > release-artifacts/latest.json

          echo "Generated latest.json:"
          cat release-artifacts/latest.json

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^desktop-v' | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${{ github.ref_name }}" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG".."${{ github.ref_name }}" -- . ':!.github')
          else
            NOTES="Initial release"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            release-artifacts/* \
            --title "Canopy ${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
