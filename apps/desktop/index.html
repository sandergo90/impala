<!doctype html>
<html lang="en" data-theme-type="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canopy</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        const raw = localStorage.getItem("canopy-ui-state");
        if (raw) {
          const parsed = JSON.parse(raw);
          const state = parsed.state || parsed;
          const themeType = state.activeThemeId?.includes("light") ? "light" : "dark";
          document.documentElement.setAttribute("data-theme-type", themeType);
          document.documentElement.style.colorScheme = themeType;
        }
      } catch {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
